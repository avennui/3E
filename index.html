<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3E LOGISTICS ACCESS</title>
  <style>
    /* --- 1. CORE SYSTEM --- */
    :root {
      --phosphor: #9aff9a;
      --bg: #010401;
      --dim: rgba(154, 255, 154, 0.4);
      --faint: rgba(154, 255, 154, 0.1);
      --mono: 'JetBrains Mono', 'Cascadia Code', ui-monospace, monospace;
    }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--phosphor);
      font-family: var(--mono);
      overflow: hidden;
      height: 100dvh;
      -webkit-font-smoothing: antialiased;
      text-transform: uppercase;
    }

    /* --- 2. THE ANALOG GRAIN --- */
    #noise {
      position: fixed; inset: -50%; width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.1; pointer-events: none; z-index: 1000;
      animation: noise-shift 0.15s infinite;
      filter: contrast(180%) brightness(15%);
    }
    @keyframes noise-shift {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(-1%, 0.5%); }
    }

    .sweep {
      position: fixed; inset: 0; height: 12vh;
      background: linear-gradient(to bottom, transparent, rgba(154, 255, 154, 0.03), transparent);
      animation: sweep 12s linear infinite;
      pointer-events: none; z-index: 900;
    }
    @keyframes sweep {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(110vh); }
    }

    /* --- 3. LAYOUT ARCHITECTURE --- */
    .container {
      position: relative; z-index: 10;
      max-width: 440px; margin: 0 auto;
      height: 100dvh; display: flex; flex-direction: column;
      padding: 50px 32px 30px; box-sizing: border-box;
    }

    /* Header: Aligned Left for unified vertical flow */
    header {
      text-align: left;
      margin-bottom: 45px;
      flex-shrink: 0;
    }
    .id-block h1 {
      margin: 0; font-size: 14px; letter-spacing: 0.4em;
      font-weight: 500; text-shadow: 0 0 10px rgba(154, 255, 154, 0.4);
    }
    .id-block .sub {
      font-size: 8px; opacity: 0.4; letter-spacing: 0.2em; margin-top: 6px;
    }

    /* Instruction Block: Flush & Direct */
    .instruction-block {
      flex-shrink: 0;
      margin-bottom: 40px;
    }
    .row {
      display: grid;
      grid-template-columns: 28px 1fr;
      margin-bottom: 14px;
      align-items: baseline;
    }
    .row .n {
      font-size: 9px; color: var(--dim); font-weight: 700;
    }
    .row .t {
      font-size: 14px; letter-spacing: 0.01em; opacity: 0.95;
    }

    .btn-copy {
      background: rgba(154, 255, 154, 0.08);
      border: 1px solid var(--dim);
      color: var(--phosphor);
      padding: 1px 10px; font-family: inherit;
      cursor: pointer; font-size: 13px; margin: 0 4px;
      transition: all 0.2s;
    }
    .btn-copy:active { background: var(--phosphor); color: #000; }

    /* Tactical Map Viewport */
    .viewport {
      position: relative; width: 100%; flex-grow: 1;
      background: #000; border: 1px solid var(--faint);
      overflow: hidden; margin-bottom: 12px;
    }
    .viewport::after {
      content: ""; position: absolute; top: 50%; left: 50%;
      width: 40px; height: 40px; transform: translate(-50%, -50%);
      pointer-events: none;
      background: 
        linear-gradient(to right, var(--phosphor) 2px, transparent 2px) 50% 50% / 12px 1px no-repeat,
        linear-gradient(to bottom, var(--phosphor) 2px, transparent 2px) 50% 50% / 1px 12px no-repeat;
      opacity: 0.4;
    }

    iframe {
      width: 100%; height: 100%; border: none;
      filter: invert(100%) grayscale(100%) sepia(100%) hue-rotate(90deg) brightness(0.5) contrast(1.4);
      opacity: 0.55;
    }
    canvas { position: absolute; inset: 0; pointer-events: none; }

    /* Footer: Pure Data */
    footer {
      display: flex; justify-content: space-between;
      font-size: 8px; opacity: 0.3; letter-spacing: 0.2em;
    }

    #toast {
      position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
      background: var(--phosphor); color: #000;
      padding: 10px 24px; font-size: 10px; font-weight: 900;
      display: none; z-index: 2000;
    }
  </style>
</head>
<body>

<div id="noise"></div>
<div class="sweep"></div>

<div class="container">
  <header>
    <div class="id-block">
      <h1>1004 UNION ST // 3E</h1>
      <div class="sub">BROOKLYN ACCESS PROTOCOL</div>
    </div>
  </header>

  <div class="instruction-block">
    <div class="row">
      <span class="n">01</span>
      <span class="t">DIAL <button class="btn-copy" onclick="copy('308')">308</button> + CALL</span>
    </div>
    <div class="row">
      <span class="n">02</span>
      <span class="t">WAIT FOR AUDIO BUZZER</span>
    </div>
    <div class="row">
      <span class="n">03</span>
      <span class="t">BYPASS LOBBY STAIRS</span>
    </div>
    <div class="row">
      <span class="n">04</span>
      <span class="t">WALK TO END OF GROUND FLOOR</span>
    </div>
    <div class="row">
      <span class="n">05</span>
      <span class="t">USE REAR STAIRS [FL 3]</span>
    </div>
  </div>

  <div class="viewport">
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3025.218447816041!2d-73.96145342341908!3d40.669145638890474!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c25b084992925b%3A0x6d907f14b3d739e1!2s1004%20Union%20St%2C%20Brooklyn%2C%20NY%2011225!5e0!3m2!1sen!2s!4v1700000000000!5m2!1sen!2s"></iframe>
    <canvas id="radar"></canvas>
  </div>
  
  <footer>
    <span id="time">00:00:00</span>
    <span>3E LOGISTICS // SITE ACTIVE</span>
  </footer>
</div>

<div id="toast">CODE COPIED</div>

<script>
  function updateTime() {
    const n = new Date();
    document.getElementById('time').textContent = n.getHours().toString().padStart(2, '0') + ":" + n.getMinutes().toString().padStart(2, '0') + ":" + n.getSeconds().toString().padStart(2, '0');
  }
  setInterval(updateTime, 1000); updateTime();

  const canvas = document.getElementById("radar");
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  let phase = 0;

  function res() {
    canvas.width = canvas.offsetWidth * dpr;
    canvas.height = canvas.offsetHeight * dpr;
    ctx.scale(dpr, dpr);
  }
  window.onresize = res; res();

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const w = canvas.width/dpr, h = canvas.height/dpr;
    const cx = w/2, cy = h/2, max = Math.max(w, h);

    for(let i=0; i<6; i++) {
      let r = (max*1.1 - ((phase*40 + i*75) % (max*1.1)));
      if(r > 0) {
        ctx.strokeStyle = `rgba(154,255,154,${(1-(r/(max*1.1)))*0.25})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(cx, cy, r, phase*0.04 + (i*Math.PI/3), phase*0.04 + (i*Math.PI/3) + 0.6);
        ctx.stroke();
      }
    }
    phase += 0.04;
    requestAnimationFrame(draw);
  }
  draw();

  function copy(val) {
    const el = document.createElement('textarea');
    el.value = val; document.body.appendChild(el);
    el.select(); document.execCommand('copy');
    document.body.removeChild(el);
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    setTimeout(()=> toast.style.display='none', 1200);
    if(navigator.vibrate) navigator.vibrate([40, 20]);
  }
</script>

</body>
</html>
